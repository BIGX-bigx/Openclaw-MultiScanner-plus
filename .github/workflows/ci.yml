name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev deps
        run: python -m pip install -r requirements-dev.txt
      - name: Compile Python
        run: python -m py_compile tools/clawmatrix_scan.py tools/clawmatrix_web.py tools/doctor.py tools/clawmatrix/*.py tests/test_*.py
      - name: Run Python tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engines/skill-guard
    steps:
      - uses: actions/checkout@v4
      - name: Run Rust tests
        run: cargo test --quiet
